[tool.black]
line-length = 120
target-version = ['py312']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | migrations
  | static
  | media
  | node_modules
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip = ["migrations", "static", "media", "node_modules", ".git"]
known_django = ["django"]
known_first_party = ["mybiz_core", "content", "pages", "config"]
sections = ["FUTURE", "STDLIB", "DJANGO", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
