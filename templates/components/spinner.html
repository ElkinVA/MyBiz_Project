<!-- Спиннер -->
<div class="flex items-center justify-center">
    <div class="animate-spin rounded-full border-2 border-gray-300 border-t-{{ color }} dark:border-gray-600 dark:border-t-{{ color }}-dark
        {% if size == 'sm' %}w-4 h-4{% endif %}
        {% if size == 'md' %}w-8 h-8{% endif %}
        {% if size == 'lg' %}w-12 h-12{% endif %}">
    </div>
</div>
