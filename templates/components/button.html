<a href="{{ href }}"
   class="{% if full_width %}w-full{% endif %}
          inline-flex items-center justify-center gap-2
          {% if type == 'primary' %}bg-gradient-to-r from-primary to-secondary text-white hover:shadow-lg hover:shadow-primary/25{% endif %}
          {% if type == 'secondary' %}bg-white dark:bg-gray-800 text-gray-900 dark:text-white border-2 border-gray-200 dark:border-gray-700 hover:border-primary hover:text-primary{% endif %}
          {% if type == 'accent' %}bg-accent text-white hover:bg-accent/90{% endif %}
          {% if size == 'sm' %}px-4 py-2 text-sm rounded-lg{% endif %}
          {% if size == 'md' %}px-6 py-3 text-base rounded-xl{% endif %}
          {% if size == 'lg' %}px-8 py-4 text-lg rounded-2xl{% endif %}
          font-medium transition-all duration-300 transform hover:-translate-y-0.5 active:translate-y-0">
    {{ text }}
    {% if icon %}
    <!-- Иконка временно отключена -->
    {% endif %}
</a>
