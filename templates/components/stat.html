<!-- Статистика -->
<div class="text-center"
     {% if animation %}x-data="counterAnimation(0, {{ number }}, 1500)"{% endif %}>
    <div class="flex items-center justify-center gap-3 mb-2">
        {% if icon %}
        <div class="w-12 h-12 rounded-full bg-{{ color }}/10 flex items-center justify-center">
            <span class="text-xl">{{ icon }}</span>
        </div>
        {% endif %}
        <div class="text-left min-w-0">
            <div class="text-3xl font-bold text-gray-900 dark:text-white {% if no_wrap %}whitespace-nowrap{% endif %}"
                 {% if animation %}x-text="value"{% endif %}
                 style="{% if force_no_wrap %}white-space: nowrap;{% endif %}">
                {% if not animation %}{{ number }}{% endif %}
            </div>
            <div class="text-sm text-gray-600 dark:text-gray-400">{{ label }}</div>
        </div>
    </div>
</div>
