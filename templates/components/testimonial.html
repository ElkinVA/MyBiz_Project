<!-- Отзыв -->
<div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
    <div class="flex items-center mb-4">
        <div class="w-12 h-12 rounded-full overflow-hidden mr-4">
            {% if avatar %}
            <img src="{{ avatar.url }}" alt="{{ author }}" class="w-full h-full object-cover">
            {% else %}
            <div class="w-full h-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-bold">
                {{ author|first }}
            </div>
            {% endif %}
        </div>
        <div>
            <h4 class="font-semibold text-gray-900 dark:text-white">{{ author }}</h4>
            <p class="text-sm text-gray-600 dark:text-gray-400">{{ role }}</p>
        </div>
    </div>
    <p class="text-gray-700 dark:text-gray-300 italic">"{{ text }}"</p>
</div>
