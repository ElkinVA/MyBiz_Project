<!-- Заголовок секции -->
<div class="{% if align == 'center' %}text-center{% endif %} mb-12">
    {% if subtitle %}
    <span class="inline-block px-4 py-1 bg-primary/10 text-primary dark:text-primary-dark rounded-full text-sm font-semibold mb-3">
        {{ subtitle }}
    </span>
    {% endif %}

    <h2 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">
        {{ title }}
    </h2>
</div>
