<!-- Карточка -->
<div class="group relative bg-white dark:bg-gray-800 rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300">
    {% if badge %}
    <div class="absolute top-4 left-4 z-10">
        <span class="inline-block px-3 py-1 text-xs font-semibold rounded-full {{ badge.color }}">
            {{ badge.text }}
        </span>
    </div>
    {% endif %}

    {% if image %}
    <div class="relative overflow-hidden aspect-video">
        <img src="{{ image.url }}"
             alt="{{ title }}"
             class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
        <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
    </div>
    {% endif %}

    <div class="p-6">
        {% if subtitle %}
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">{{ subtitle }}</p>
        {% endif %}

        {% if title %}
        <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-3 group-hover:text-primary dark:group-hover:text-primary-dark transition-colors">{{ title }}</h3>
        {% endif %}

        {{ content|default:""|safe }}
    </div>
</div>
