{% extends "admin/change_form.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<style>
/* Стили для формы настроек сайта */
.field-color_scheme select {
    width: 100%;
    max-width: 400px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 2px solid #e5e7eb;
    font-size: 0.95rem;
}

.field-color_scheme select:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

/* Поля изображений */
.field-logo .file-upload,
.field-favicon .file-upload,
.field-hero_image .file-upload {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.field-logo img,
.field-favicon img,
.field-hero_image img {
    max-width: 200px;
    max-height: 200px;
    border-radius: 8px;
    border: 2px solid #e5e7eb;
}

/* Адаптация для мобильных */
@media (max-width: 768px) {
    /* На мобильных все поля в одну колонку */
}

/* Уведомление о сохранении */
.settings-saved-notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    padding: 16px 24px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    z-index: 10000;
    animation: slideInDown 0.3s ease;
    display: none;
}

.settings-saved-notification.show {
    display: block;
}

@keyframes slideInDown {
    from {
        transform: translateY(-100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Помощь по цветовой схеме */
.color-scheme-help {
    background: rgba(59, 130, 246, 0.05);
    border-left: 4px solid #3b82f6;
    padding: 12px 16px;
    margin-bottom: 16px;
    border-radius: 0 8px 8px 0;
}

.color-scheme-help p {
    margin: 0;
    color: #1f2937;
    font-size: 0.9rem;
}
</style>
{% endblock %}

{% block content %}
{{ block.super }}

<!-- Уведомление о сохранении -->
<div id="settings-saved-notification" class="settings-saved-notification">
    ✅ Настройки успешно сохранены!
</div>
{% endblock %}

{% block admin_change_form_document_ready %}
{{ block.super }}
<script>
(function() {
    'use strict';

    // Флаг для отслеживания изменений
    let hasUnsavedChanges = false;

    // Показ уведомления при успешном сохранении через URL параметр
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('_saved')) {
        const notification = document.getElementById('settings-saved-notification');
        if (notification) {
            notification.classList.add('show');
            setTimeout(function() {
                notification.classList.remove('show');
            }, 3000);
        }
        // Очищаем параметр URL без перезагрузки
        const newUrl = new URL(window.location);
        newUrl.searchParams.delete('_saved');
        window.history.replaceState({}, '', newUrl);
    }

    // Обновление превью цветов
    document.querySelectorAll('input[type="color"], input.vColorPickerField').forEach(function(input) {
        input.addEventListener('input', function() {
            const preview = this.parentElement.querySelector('.color-preview');
            if (preview) {
                preview.style.backgroundColor = this.value;
            }
            markAsChanged();
        });
    });

    // Предпросмотр изображений
    document.querySelectorAll('input[type="file"][accept="image/*"]').forEach(function(input) {
        input.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewContainer = input.parentElement.querySelector('.image-preview-container');
                    const previewImg = previewContainer.querySelector('.image-preview');
                    if (previewContainer && previewImg) {
                        previewImg.src = e.target.result;
                        previewContainer.style.display = 'block';
                    }
                };
                reader.readAsDataURL(file);
            }
            markAsChanged();
        });
    });

    // Отслеживание изменений во всех полях формы
    const form = document.querySelector('#content-main form');
    if (form) {
        const formInputs = form.querySelectorAll('input:not([type="hidden"]):not([type="submit"]), textarea, select');
        
        // Добавляем обработчики изменений
        formInputs.forEach(function(input) {
            input.addEventListener('change', function() {
                markAsChanged();
            });
            input.addEventListener('input', function() {
                markAsChanged();
            });
        });

        // Функция отметки изменений
        function markAsChanged() {
            hasUnsavedChanges = true;
        }

        // Предупреждение при попытке уйти с страницы с несохранёнными изменениями
        window.addEventListener('beforeunload', function(e) {
            if (hasUnsavedChanges) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });

        // После успешной отправки формы сбрасываем флаг
        form.addEventListener('submit', function() {
            hasUnsavedChanges = false;
        });
    }

    // Обработчик для уведомления об успешном сохранении (после перезагрузки)
    document.addEventListener('DOMContentLoaded', function() {
        const notification = document.getElementById('settings-saved-notification');
        if (notification && !urlParams.has('_saved')) {
            // Показываем только если есть параметр _saved
            notification.classList.remove('show');
        }
    });
})();
</script>
{% endblock %}
