{% extends "admin/change_form.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<style>
/* Стили для формы настроек сайта */
.field-color_scheme select {
    width: 100%;
    max-width: 400px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 2px solid #e5e7eb;
    font-size: 0.95rem;
}

.field-color_scheme select:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

/* Поля изображений */
.field-logo .file-upload,
.field-favicon .file-upload,
.field-hero_image .file-upload {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.field-logo img,
.field-favicon img,
.field-hero_image img {
    max-width: 200px;
    max-height: 200px;
    border-radius: 8px;
    border: 2px solid #e5e7eb;
}

/* Адаптация для мобильных */
@media (max-width: 768px) {
    /* На мобильных все поля в одну колонку */
}

/* Помощь по цветовой схеме */
.color-scheme-help {
    background: rgba(59, 130, 246, 0.05);
    border-left: 4px solid #3b82f6;
    padding: 12px 16px;
    margin-bottom: 16px;
    border-radius: 0 8px 8px 0;
}

.color-scheme-help p {
    margin: 0;
    color: #1f2937;
    font-size: 0.9rem;
}
</style>
{% endblock %}

{% block content %}
{{ block.super }}
{% endblock %}
