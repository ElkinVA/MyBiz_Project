<nav class="breadcrumbs" aria-label="Хлебные крошки">
    <ol class="flex items-center flex-wrap gap-2 text-sm">
        <li>
            <a href="{% url 'mybiz_core:home' %}" class="breadcrumb-link">Главная</a>
        </li>

        {% if category %}
        <li class="flex items-center">
            <svg class="w-4 h-4 mx-1 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <a href="{% url 'mybiz_core:product_list' %}" class="breadcrumb-link">Товары</a>
        </li>
        <li class="flex items-center min-w-0">
            <svg class="w-4 h-4 mx-1 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="breadcrumb-current truncate max-w-[120px] sm:max-w-[200px] md:max-w-none" title="{{ category.name }}">
                {{ category.name }}
            </span>
        </li>

        {% elif request.path == '/products/' %}
        <li class="flex items-center">
            <svg class="w-4 h-4 mx-1 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="breadcrumb-current">Все товары</span>
        </li>

        {% elif page %}
        <li class="flex items-center min-w-0">
            <svg class="w-4 h-4 mx-1 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="breadcrumb-current truncate max-w-[120px] sm:max-w-[200px] md:max-w-none" title="{{ page.title }}">
                {{ page.title }}
            </span>
        </li>
        {% endif %}
    </ol>
</nav>
